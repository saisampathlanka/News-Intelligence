# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# Render Blueprint — NewsIntel v5
# Deploys: API (Python) + Static Frontend + PostgreSQL
#
# Usage:
#   1. Push repo to GitHub/GitLab
#   2. Render Dashboard → Blueprints → Connect repo
#   3. Click "Apply" — all three services created automatically
#   4. Set NEWSAPI_KEY / GUARDIAN_API_KEY / GNEWS_API_KEY in service env (optional)
#   5. POST /auth/register to create your first user, or set INITIAL_ADMIN_* env vars
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  - type: web
    name: news-intel-api
    env: python
    region: oregon
    plan: free
    buildCommand: >
      pip install --prefer-binary -r requirements.txt &&
      python -m spacy download en_core_web_sm --user
    startCommand: >
      sh -c "alembic upgrade head && uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1"
    healthCheckPath: /health
    envVars:

      # Runtime
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: ENV
        value: production
      - key: DEBUG
        value: "false"

      # Database (auto-linked to the Postgres service below)
      - key: DATABASE_URL
        fromDatabase:
          name: news-intel-db
          property: connectionString

      # ── Security ────────────────────────────────────────────────────────────
      # SECRET_KEY is auto-generated by Render on first deploy (64 hex chars)
      - key: SECRET_KEY
        generateValue: true
      - key: AUTH_MODE
        value: required
      - key: ALLOWED_ORIGINS
        value: "https://news-intel-frontend.onrender.com"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"

      # Optional: seed first admin on startup (remove after first login)
      # - key: INITIAL_ADMIN_EMAIL
      #   value: admin@yourcompany.com
      # - key: INITIAL_ADMIN_PASSWORD
      #   value: ChangeMe123!

      # ── News APIs (optional — RSS works without these) ───────────────────────
      - key: NEWSAPI_KEY
        sync: false        # set manually in Render dashboard
      - key: GUARDIAN_API_KEY
        sync: false
      - key: GNEWS_API_KEY
        sync: false

      # ── Scheduler ────────────────────────────────────────────────────────────
      - key: FETCH_INTERVAL_MINUTES
        value: "60"           # Free tier: 60min to avoid sleep during ingest
      - key: MAX_ARTICLES_PER_SOURCE
        value: "50"
      - key: STOCK_UPDATE_INTERVAL_MINUTES
        value: "15"

      # ── Rate Limits ──────────────────────────────────────────────────────────
      - key: RATE_LIMIT_DEFAULT
        value: "60"
      - key: RATE_LIMIT_EXPENSIVE
        value: "20"
      - key: RATE_LIMIT_ADMIN
        value: "10"
      - key: RATE_LIMIT_STOCKS
        value: "30"

      # ── Cache TTLs ────────────────────────────────────────────────────────────
      - key: CACHE_TTL_SUMMARY
        value: "60"
      - key: CACHE_TTL_TOPICS
        value: "120"
      - key: CACHE_TTL_ARTICLES
        value: "30"
      - key: CACHE_TTL_TRENDING
        value: "90"
      - key: CACHE_TTL_STOCKS
        value: "60"

  # ── Frontend static site ─────────────────────────────────────────────────────
  - type: web
    name: news-intel-frontend
    env: static
    buildCommand: echo 'No build step required'
    staticPublishPath: ./frontend
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /index.html
        name: Cache-Control
        value: no-store                 # always fetch fresh HTML
    routes:
      - type: rewrite
        source: /*
        destination: /index.html        # SPA fallback

databases:
  - name: news-intel-db
    databaseName: newsdb
    user: newsuser
    plan: free
    region: oregon

